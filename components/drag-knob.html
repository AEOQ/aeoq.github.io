<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>drag-knob</title>
<script type="module" src="../drag-knob.mjs"></script>
<style>
    :not(:defined) {opacity: 0;}
    drag-knob {transition: opacity .5s;}

    form {background:black; color:white; display:flex; gap:0 .5em; padding:1em;}
    [name=knob-1] {--color:lime;}
    [name=knob-2] {
        --color:turquoise;
        &::part(output)::after {background:conic-gradient(#a3a3a8,#e0eaf1,#a3a3a8,#e0eaf1,#a3a3a8,#e0eaf1,#a3a3a8,#e0eaf1,#a3a3a8,#e0eaf1,#a3a3a8);}
    }
    [name=knob-3] {--color:yellow;}
    [name=speed] {--color:magenta;}
    [name=choice] {--color:white;}
    input {width:26em;}
</style>
<form>
    <drag-knob class="no-svg" name="knob-1" value="43" range="0/100/.01/%" snap="[0,1.1,10.3,99]"></drag-knob>
    <drag-knob class="no-svg" name="knob-2" value="43" range="-50/50/.01" snap="25"></drag-knob>
    <drag-knob class="no-svg" name="knob-3" range=".1/.9/.1"><a href="./">INDEX</a></drag-knob>
    <drag-knob class="no-svg" title="Choice" name="choice" value="A" range='["A","B","C","D","E"]'></drag-knob>
    <drag-knob class="no-svg" title="Number" name="speed" range="[8,7,6,5,4]"></drag-knob>
</form>
<form>
    <drag-knob name="knob-1" value="43" range="0/100/.01/%" snap="[0,1.1,10.3,99]"></drag-knob>
    <drag-knob name="knob-2" value="43" range="-50/50/.01" snap="25"></drag-knob>
    <drag-knob name="knob-3" range=".1/.9/.1">
        <a href="./">Link</a>
    </drag-knob>
    <drag-knob title="Choice" name="choice" value="A" range='["A","B","C","D","E"]'><b class="center">s</b></drag-knob>
    <drag-knob title="Number" name="speed" range="[8,7,6,5,4]"><i>ss</i></drag-knob>
</form>

<button onclick="this.nextElementSibling.value=JSON.stringify([...new FormData(document.forms[0])])">
    [...new FormData(document.forms[0])]
</button>
