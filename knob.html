<!DOCTYPE html>
<script type=module>
import * as Knob from './knob.mjs'
</script>
<style>
    form {background:black; color:white; display:flex; gap:0 .5em; padding:1em;}
    [name=knob-1] {--glow:lime;}
    [name=knob-2] {
        --glow:turquoise;
        &::part(output)::before {background:conic-gradient(#a3a3a8,#e0eaf1,#a3a3a8,#e0eaf1,#a3a3a8,#e0eaf1,#a3a3a8,#e0eaf1,#a3a3a8,#e0eaf1,#a3a3a8);}
    }
    [name=knob-3] {--glow:yellow;}
    [name=speed] {--glow:magenta;}
    [name=choice] {--glow:white;}
    textarea {width:100%;height:40em;}
    input {width:26em;}
</style>
<details>
    <summary>View source</summary>
    <textarea></textarea>
</details>
<form>
    <drag-knob name="knob-1" value="43" range="0/100/.01/%" snap="[0,1.1,10.3,99]"></drag-knob>
    <drag-knob name="knob-2" value="43" range="-50/50/.01" snap="25"></drag-knob>
    <drag-knob name="knob-3" range=".1/.9/.1">
        <a href="./">Link</a>
    </drag-knob>
    <drag-knob title="Choice" name="choice" value="A" range='["A","B","C","D","E"]'></drag-knob>
    <drag-knob title="Number" name="speed" range="[8,7,6,5,4]"></drag-knob>
</form>
<button onclick="this.nextElementSibling.value=JSON.stringify([...new FormData(document.forms[0])])">
    [...new FormData(document.forms[0])]
</button>
